<!DOCTYPE html>
<html>
<head>
    <title>DropoutGuard AI - 230 Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
       .card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
       .btn-predict { background: #667eea; border: none; }
       .btn-predict:hover { background: #764ba2; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="card p-4">
        <h2 class="text-center mb-4">🎓 Student Dropout Prediction System</h2>
        <h6 class="text-center text-muted">230 Project - AI Counseling Assistant</h6>

        <form method="POST" action="/predict">
            <div class="mb-3">
                <label>Student Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Marks %</label>
                <input type="number" name="marks" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Attendance %</label>
                <input type="number" name="attendance" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Fees Paid?</label>
                <select name="fees" class="form-control">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>
            <button type="submit" class="btn btn-predict text-white w-100">Predict Risk 🔍</button>
        </form>

        {% if result %}
        <div class="alert alert-{{color}} mt-4 text-center">
            <h4>{{result}}</h4>
            <p>{{suggestion}}</p>
        </div>
        {% endif %}
    </div>
</div>
</body>
</html>
